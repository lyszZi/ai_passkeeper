disabled_rules:
  - trailing_whitespace
  - function_parameter_count
  - non_optional_string_data_conversion

opt_in_rules:
  - empty_count
  - missing_docs

excluded:
  - .build
  - Pods
  - DerivedData

line_length:
  warning: 120
  error: 200

type_body_length:
  warning: 300
  error: 400

file_length:
  warning: 500
  error: 1000

function_body_length:
  warning: 50
  error: 100

type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 2
  max_length: 60
  excluded:
    - id
    - x
    - y